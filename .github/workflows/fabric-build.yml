name: BlockCoach Fabric Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: blockcoach-fabric-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-tests:
    name: Web app checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run web checks and tests
        run: npm run ci:web

  fabric-build:
    name: Fabric client JAR
    runs-on: ubuntu-latest
    needs: web-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Resolve Fabric artifacts for Minecraft 1.21.11
        run: npm run fabric:resolve

      - name: Preflight Fabric build
        run: npm run fabric:preflight

      - name: Build Fabric JAR
        run: npm run fabric:build

      - name: Upload Fabric JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockcoach-client-0.57.0-minecraft-1.21.11
          path: fabric-mod/blockcoach-client/build/libs/*.jar
          if-no-files-found: error
