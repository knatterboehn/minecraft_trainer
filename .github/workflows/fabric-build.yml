name: BlockCoach Fabric Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: blockcoach-fabric-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-tests:
    name: Web app checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Run web checks and core tests
        run: npm run ci:web

  browser-e2e:
    name: Browser E2E checks
    runs-on: ubuntu-latest
    needs: web-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Show browser environment
        shell: bash
        run: |
          set -euo pipefail
          which google-chrome-stable || true
          which google-chrome || true
          which chromium || true
          which chromium-browser || true
          google-chrome-stable --version || google-chrome --version || chromium --version || chromium-browser --version

      - name: Run browser E2E test
        env:
          E2E_CHROME_PATH: /usr/bin/google-chrome-stable
        run: npm run ci:e2e

      - name: Upload E2E screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blockcoach-e2e-screens
          path: docs/e2e-screens/*.png
          if-no-files-found: ignore

  fabric-build:
    name: Fabric client JAR
    runs-on: ubuntu-latest
    needs:
      - web-tests
      - browser-e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Resolve Fabric artifacts for Minecraft 1.21.11
        run: npm run fabric:resolve

      - name: Preflight Fabric build
        run: npm run fabric:preflight

      - name: Build Fabric JAR
        run: npm run fabric:build

      - name: Upload Fabric JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockcoach-client-0.59.0-minecraft-1.21.11
          path: fabric-mod/blockcoach-client/build/libs/*.jar
          if-no-files-found: error
