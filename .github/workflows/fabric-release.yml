name: BlockCoach Alpha Release

on:
  push:
    tags:
      - 'v*.*.*-alpha'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing alpha tag to release, for example v0.61.0-alpha'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: blockcoach-alpha-release-${{ github.ref }}-${{ github.event.inputs.tag_name }}
  cancel-in-progress: false

jobs:
  alpha-release:
    name: Build and publish alpha release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Run web checks
        run: npm run ci:web

      - name: Show browser environment
        shell: bash
        run: |
          set -euo pipefail
          which google-chrome-stable || true
          which google-chrome || true
          which chromium || true
          which chromium-browser || true
          google-chrome-stable --version || google-chrome --version || chromium --version || chromium-browser --version

      - name: Run browser E2E test
        env:
          E2E_CHROME_PATH: /usr/bin/google-chrome-stable
        run: npm run ci:e2e

      - name: Resolve Fabric artifacts
        run: npm run fabric:resolve

      - name: Preflight Fabric build
        run: npm run fabric:preflight

      - name: Build Fabric JAR
        run: npm run fabric:build

      - name: Locate release JAR
        id: jar
        shell: bash
        run: |
          set -euo pipefail
          JAR_PATH="$(find fabric-mod/blockcoach-client/build/libs -maxdepth 1 -type f -name 'blockcoach-client-*.jar' ! -name '*-sources.jar' | sort | head -n 1)"
          if [ -z "${JAR_PATH}" ]; then
            echo "No release jar found in fabric-mod/blockcoach-client/build/libs" >&2
            exit 1
          fi
          echo "path=${JAR_PATH}" >> "$GITHUB_OUTPUT"
          echo "file=$(basename "${JAR_PATH}")" >> "$GITHUB_OUTPUT"
          ls -la fabric-mod/blockcoach-client/build/libs

      - name: Upload Fabric JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockcoach-client-0.61.0-minecraft-1.21.11
          path: ${{ steps.jar.outputs.path }}
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          case "${TAG_NAME}" in
            v*.*.*-alpha) ;;
            *) echo "Release tag must look like v0.61.0-alpha. Got: ${TAG_NAME}" >&2; exit 1 ;;
          esac
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub alpha release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release_tag.outputs.tag }}
          JAR_PATH: ${{ steps.jar.outputs.path }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists. Uploading/replacing jar asset."
            gh release upload "${TAG_NAME}" "${JAR_PATH}" --clobber
          else
            gh release create "${TAG_NAME}" "${JAR_PATH}" \
              --title "BlockCoach Client ${TAG_NAME#v}" \
              --notes-file docs/release-notes-alpha-template.md \
              --prerelease
          fi
